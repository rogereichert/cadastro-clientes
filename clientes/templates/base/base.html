<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Cadastro{% endblock %}</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="min-h-screen bg-[#0B0F19] text-slate-100">
    <!-- Background glow (bem Linear) -->
    <div class="pointer-events-none fixed inset-0">
      <div class="absolute -top-40 left-1/2 h-[520px] w-[920px] -translate-x-1/2 rounded-full
                  bg-gradient-to-r from-indigo-500/15 via-sky-500/10 to-fuchsia-500/15 blur-3xl"></div>
      <div class="absolute inset-0 bg-gradient-to-b from-black/0 via-black/20 to-black/60"></div>
    </div>

    <header class="sticky top-0 z-40 border-b border-white/10 bg-[#0B0F19]/70 backdrop-blur">
      <div class="mx-auto max-w-6xl px-4 py-3 flex items-center justify-between">
        <a href="{% url 'clientes:list' %}" class="flex items-center gap-2 group">
          <div class="h-9 w-9 rounded-xl border border-white/10 bg-white/5 grid place-items-center">
            <span class="text-sm font-semibold tracking-tight">FC</span>
          </div>
          <div class="leading-tight">
            <div class="text-sm font-semibold tracking-tight group-hover:opacity-90">Cadastro de Clientes</div>
            <div class="text-xs text-slate-400">Django • Tailwind CDN</div>
          </div>
        </a>

        <nav class="text-sm text-slate-300">
          <a class="rounded-lg px-3 py-2 hover:bg-white/5 hover:text-slate-100 transition"
             href="{% url 'clientes:list' %}">
            Clientes
          </a>
        </nav>
      </div>
    </header>

    <main class="relative mx-auto max-w-6xl px-4 py-8">
      {% if messages %}
        <div class="space-y-3 mb-6">
          {% for message in messages %}
            <div class="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-slate-100">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
