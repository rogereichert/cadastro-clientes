<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Cadastro{% endblock %}</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-slate-950 text-slate-100 min-h-screen">
    <header class="border-b border-white/10 bg-white/5">
      <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="font-semibold tracking-tight">
          <a href="/clientes/" class="hover:opacity-90">Cadastro de Clientes</a>
        </div>
        <nav class="text-sm text-slate-300">
          <a class="hover:text-slate-100" href="/clientes/">Clientes</a>
        </nav>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
      {% if messages %}
        <div class="space-y-3 mb-6">
          {% for message in messages %}
            <div class="rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-sm">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
